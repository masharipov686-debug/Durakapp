<!DOCTYPE html>
<html>
<body style="background:black;color:white;text-align:center;padding-top:40px;">

<h2>📸 Real Image Upload</h2>

<input type="file" id="file" accept="image/*">

<br><br>

<button onclick="send()">YUBORISH</button>

<p id="res">natija...</p>

<script>

function toBase64(file){
  return new Promise((resolve,reject)=>{
    let reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = ()=>resolve(reader.result);
    reader.onerror = err=>reject(err);
  });
}

async function send(){

  let file = document.getElementById("file").files[0];
  if(!file) return alert("rasm tanla");

  let base64 = await toBase64(file);

  let res = await fetch("http://104.207.64.18:5000/analyze", {
    method:"POST",
    headers:{
      "Content-Type":"application/json"
    },
    body: JSON.stringify({
      image: base64
    })
  });

  let data = await res.json();

  document.getElementById("res").innerText =
    JSON.stringify(data);
}

</script>

</body>
</html>
